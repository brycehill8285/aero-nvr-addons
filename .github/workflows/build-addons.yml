name: Build Add-on Bundles

# Builds the opt-in add-on bundles for Aero NVR (accelerator runtimes and
# camera-integration services) and publishes them as releases in THIS (public)
# repo, so the in-app installer can download them anonymously. Uses the
# built-in GITHUB_TOKEN — no PAT secret required.
# Run manually: Actions -> this workflow -> Run workflow -> pick the add-on.
on:
  workflow_dispatch:
    inputs:
      addon:
        description: "Which add-on bundle to build"
        required: true
        default: cuda
        type: choice
        options:
          - cuda
          - blink

permissions:
  contents: write

jobs:
  cuda:
    if: ${{ github.event.inputs.addon == 'cuda' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: addons-cuda-cu118-v1
      ASSET: aero-nvr-cuda-cu118.tar.gz
    steps:
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve + vendor the CUDA runtime (pre-resolved, no runtime pip)
        run: |
          # Keep these pins in sync with the base image's requirements.txt
          # (onnxruntime 1.18 / torch 2.2.2). --target makes a relocatable tree.
          python -m pip install --upgrade pip
          pip install --target build/site-packages \
            --extra-index-url https://download.pytorch.org/whl/cu118 \
            onnxruntime-gpu==1.18.0 \
            torch==2.2.2+cu118 \
            torchvision==0.17.2+cu118 \
            PyNvVideoCodec==2.1.0 \
            av==18.0.0
          # PyNvVideoCodec (NVDEC) + av (PyAV demux) power the GPU-resident
          # main-stream reader (NVDECGpuReader): the 4K frame is decoded on NVDEC
          # and kept in VRAM as a CUDA tensor, so detection never copies it to the
          # CPU. Neither pulls numpy, so the numpy/pillow strip below stays valid.
          find build/site-packages -type d -name "__pycache__" -prune -exec rm -rf {} +
          # CRITICAL: the base image pins numpy 1.26.4 and its native modules
          # (faiss, onnxruntime, opencv, openvino) are compiled against numpy 1.x.
          # pip pulls numpy 2.x + pillow here as deps; if they ship in the bundle
          # they shadow the base via PYTHONPATH and break every C-extension with
          # "_ARRAY_API not found". Remove packages the base already provides so
          # the bundle only supplies GPU-specific bits (onnxruntime-gpu, torch cu118).
          rm -rf build/site-packages/numpy build/site-packages/numpy.libs build/site-packages/numpy-*.dist-info
          rm -rf build/site-packages/PIL build/site-packages/pillow* build/site-packages/Pillow-*.dist-info
          # CRITICAL: cuDNN 8 dlopen()s the plain SONAME "libnvrtc.so", but the pip
          # wheel ships only the versioned libnvrtc.so.11.2. Without this link,
          # libcudnn_cnn_infer.so.8 fails to load ("Could not load library
          # libcudnn_cnn_infer.so.8. Error: libnvrtc.so: cannot open shared object
          # file"), the detector dies on its FIRST inference, s6 restarts the
          # backend, and the whole site flaps every ~5 seconds. The base image used
          # to carry this symlink; it was dropped when the CUDA stack moved out of
          # the image and the bundle never re-created it. Relative, so it stays
          # valid wherever /config/addons/<id> is extracted.
          d=build/site-packages/nvidia/cuda_nvrtc/lib
          so=$(ls "$d"/libnvrtc.so.* 2>/dev/null | head -1)
          if [ -z "$so" ]; then
            echo "::error::libnvrtc.so.* not found in $d -- CUDA add-on would crashloop"
            exit 1
          fi
          ln -sfn "$(basename "$so")" "$d/libnvrtc.so"
          echo "linked libnvrtc.so -> $(basename "$so")"

      - name: Tarball + split into <2 GiB parts (GitHub asset limit)
        run: |
          tar czf "${ASSET}" -C build site-packages
          split -b 1900m -d -a 3 "${ASSET}" "${ASSET}.part"
          rm -f "${ASSET}"
          sha256sum "${ASSET}".part* > "${ASSET}.sha256"
          ls -lh "${ASSET}".part*

      - name: Publish parts to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --repo "${{ github.repository }}" \
              --title "NVIDIA CUDA add-on (cu118)" \
              --notes "Pre-resolved onnxruntime-gpu 1.18 + torch 2.2.2 cu118 runtime for the in-app Hardware Add-ons installer. Split into <2 GiB parts."
          fi
          gh release upload "${RELEASE_TAG}" "${ASSET}".part* "${ASSET}.sha256" \
            --repo "${{ github.repository }}" --clobber


  blink:
    if: ${{ github.event.inputs.addon == 'blink' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: addons-blink-v1
      ASSET: aero-nvr-blink.tar.gz
      MEDIAMTX_VERSION: v1.11.3
    steps:
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Vendor blinkpy + MediaMTX (pre-resolved, no runtime pip)
        run: |
          # blinkpy pin matches the Scrypted Blink plugin; 0.25.x is the first
          # line with native immis livestream support. Installed with Python
          # 3.11 so any compiled wheels (aiohttp/multidict/yarl) are cp311,
          # matching the base image's interpreter. The bundle's site-packages
          # are only put on the BRIDGE child process's PYTHONPATH (see
          # blink_service.py in the app repo), never the backend's, so no
          # numpy/pillow stripping is needed here.
          python -m pip install --upgrade pip
          pip install --target build/site-packages blinkpy==0.25.7
          find build/site-packages -type d -name "__pycache__" -prune -exec rm -rf {} +
          # MediaMTX: the loopback RTSP server the bridge publishes into. Keep
          # the version in sync with the config keys blink_service.py generates
          # (rtspTransports etc. — validated against v1.11.x).
          mkdir -p build/bin
          curl -fsSL "https://github.com/bluenviron/mediamtx/releases/download/${MEDIAMTX_VERSION}/mediamtx_${MEDIAMTX_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C build/bin mediamtx

      - name: Tarball (single part; installer expects .part000 naming)
        run: |
          tar czf "${ASSET}" -C build site-packages bin
          mv "${ASSET}" "${ASSET}.part000"
          sha256sum "${ASSET}".part* > "${ASSET}.sha256"
          ls -lh "${ASSET}".part*

      - name: Publish parts to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --repo "${{ github.repository }}" \
              --title "Blink camera add-on" \
              --notes "Pre-resolved blinkpy runtime + MediaMTX for the in-app Blink camera integration add-on."
          fi
          gh release upload "${RELEASE_TAG}" "${ASSET}".part* "${ASSET}.sha256" \
            --repo "${{ github.repository }}" --clobber
